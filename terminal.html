<!DOCTYPE html>

            border: none;

            bottom: 20px; 
            left: 20px;

            color: #00FF00;
            font-family: monospace;
            padding: 20px;
            text-align: center;
            width: 400px;
            position: fixed;
            top: 50%;
            left: 50%;
			bottom: -50%
			right: -50%

        .error-popup::backdrop {
            background-color: rgba(0, 0, 0, 0.85);

            border: 1px solid #00FF00;

            padding: 10px 20px;

        }

            background: #00FF00;

        }
    </style>
</head>
